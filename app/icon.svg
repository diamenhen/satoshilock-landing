<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d4a857"/>
      <stop offset="0.5" stop-color="#f5d97e"/>
      <stop offset="1" stop-color="#d4a857"/>
    </linearGradient>
    <radialGradient id="bgGrad" cx="32" cy="32" r="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1a1408"/>
